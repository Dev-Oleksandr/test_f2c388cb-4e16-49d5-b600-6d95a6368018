services:
  database:
    image: postgres:17.5-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=$DATABASE_NAME
      - POSTGRES_USER=$DATABASE_USER
      - POSTGRES_PASSWORD=$DATABASE_PASSWORD
    ports:
      - "$BIND_DATABASE_PORT:5432"
    networks:
      - test-net
    volumes:
      - ./docker/volumes/pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME} -h localhost || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api-server:
    build: .
    container_name: api-server
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./src:/app/src
    ports:
      - "$BIND_PORT:3000"
      - '9229:9229'
    depends_on:
      database:
        condition: service_healthy
    networks:
      - test-net

networks:
  test-net:
